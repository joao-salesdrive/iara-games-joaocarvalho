<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crie sua conta na Iara Games e descubra jogos indie brasileiros.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./auth.css">

    <title>Criar conta — Iara Games</title>
</head>
<body>

    <header class="header" role="banner">
        <a href="./index.html" class="logo" aria-label="Iara Games — página inicial">
            <img src="./images/logo-iara-v1.png" alt="Logo Iara Games" width="24" height="24">
            <span>IARA</span>
        </a>
    </header>

    <main class="auth-main" id="conteudo-principal">
        <section class="auth-card" aria-labelledby="titulo-cadastro">

            <div class="auth-header">
                <span class="auth-label">// bem-vindo à comunidade</span>
                <h1 class="auth-title" id="titulo-cadastro">Criar conta</h1>
            </div>

            <form class="auth-form" action="#" method="post" novalidate>

                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        placeholder="Seu nome"
                        autocomplete="name"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="seu@email.com"
                        autocomplete="email"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Mínimo 8 caracteres"
                        autocomplete="new-password"
                        minlength="8"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="confirma-senha">Confirmar senha</label>
                    <input
                        type="password"
                        id="confirma-senha"
                        name="confirma-senha"
                        placeholder="Repita sua senha"
                        autocomplete="new-password"
                        required
                        aria-required="true"
                    >
                </div>

                <fieldset class="form-group form-fieldset">
                    <legend>Gêneros favoritos <span class="form-optional">(opcional)</span></legend>
                    <div class="checkbox-grid">
                        <label class="checkbox-label">
                            <input type="checkbox" name="generos" value="acao">
                            <span>Ação</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="generos" value="rpg">
                            <span>RPG</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="generos" value="terror">
                            <span>Terror</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="generos" value="aventura">
                            <span>Aventura</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="generos" value="estrategia">
                            <span>Estratégia</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="generos" value="puzzle">
                            <span>Puzzle</span>
                        </label>
                    </div>
                </fieldset>

                <label class="checkbox-label form-terms">
                    <input type="checkbox" name="termos" required aria-required="true">
                    <span>Li e aceito os <a href="./em-construcao.html" class="form-link">Termos de uso</a> e a <a href="./em-construcao.html" class="form-link">Política de privacidade</a></span>
                </label>

                <button type="submit" class="btn-primary">
                    Criar conta
                </button>

            </form>

            <p class="auth-footer-text">
                Já tem uma conta?
                <a href="./login.html" class="form-link">Fazer login</a>
            </p>

        </section>
    </main>

</body>
</html>
